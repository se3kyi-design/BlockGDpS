<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BlockGDPS</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #0b0c14;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Анімований фон */
        .animated-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: url('Bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: moveBackground 30s linear infinite;
            z-index: 0;
        }

        @keyframes moveBackground {
            0% {
                transform: translate(0, 0) scale(1.1);
            }
            25% {
                transform: translate(-2%, -1%) scale(1.12);
            }
            50% {
                transform: translate(-1%, -2%) scale(1.1);
            }
            75% {
                transform: translate(1%, -1%) scale(1.12);
            }
            100% {
                transform: translate(0, 0) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo {
            max-width: 90%;
            width: auto;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            margin-bottom: 3.5rem;
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.9));
        }

        .buttons-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
            width: 100%;
        }

        .download-btn {
            position: relative;
            width: 180px;
            height: 180px;
            background-image: url('Square.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.8));
            background-color: transparent;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }

        .download-btn:active {
            transform: scale(0.96);
        }

        .btn-icon {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px black);
            pointer-events: none;
        }

        @media (max-width: 550px) {
            .buttons-row {
                gap: 1.5rem;
            }
            .download-btn {
                width: 150px;
                height: 150px;
            }
            .btn-icon {
                width: 65px;
                height: 65px;
            }
            .logo {
                max-height: 140px;
                margin-bottom: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="container">
        <img src="Logo.png" alt="BlockGDPS" class="logo">

        <div class="buttons-row">
            <!-- Кнопка Android (пряме завантаження) -->
            <a class="download-btn" id="androidBtn" href="https://www.dropbox.com/scl/fi/x3ti8qxbmi8ain086lzii/BlockGDPS.apk?rlkey=l6w7yoxmgrcggmuxv6ne23rko&st=ddfjr9b7&dl=1" aria-label="Android">
                <img src="Android.png" alt="Android" class="btn-icon">
            </a>

            <!-- Кнопка Windows (пряме завантаження) -->
            <a class="download-btn" id="windowsBtn" href="https://www.dropbox.com/scl/fi/r413zokn4hjwbgx06b7yf/BlockGDPS.zip?rlkey=oq9du9mzimgrc4dxtxd8ica33&st=lq1p4xnw&dl=1" aria-label="Windows">
                <img src="Windows.png" alt="Windows" class="btn-icon">
            </a>

            <!-- Кнопка Discord -->
            <a class="download-btn" id="discordBtn" href="https://discord.gg/xb6V9rCnb" target="_blank" rel="noopener noreferrer" aria-label="Discord">
                <img src="Discord.png" alt="Discord" class="btn-icon">
            </a>
        </div>
    </div>

    <script>
        (function() {
            const androidBtn = document.getElementById('androidBtn');
            const windowsBtn = document.getElementById('windowsBtn');
            const discordBtn = document.getElementById('discordBtn');

            function addVibrate(element) {
                if (element) {
                    element.addEventListener('click', function() {
                        if (window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(20);
                        }
                    });
                }
            }

            addVibrate(androidBtn);
            addVibrate(windowsBtn);
            addVibrate(discordBtn);

            [androidBtn, windowsBtn, discordBtn].forEach(btn => {
                if (btn) {
                    btn.addEventListener('contextmenu', (e) => e.preventDefault());
                }
            });
        })();
    </script>
</body>
</html>
